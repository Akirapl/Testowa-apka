<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Snake - Nokia 3310</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }

        .phone {
            background: #2c3e6b;
            border-radius: 30px;
            padding: 20px;
            box-shadow:
                0 0 0 3px #1a2a4a,
                0 0 0 6px #3d5a99,
                0 10px 40px rgba(0,0,0,0.5);
            max-width: 360px;
            width: 95vw;
        }

        .screen-frame {
            background: #7b8c3e;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
        }

        .screen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px 6px 4px;
            color: #2d3a1a;
            font-size: 11px;
            font-weight: bold;
        }

        .screen-header .title {
            font-size: 12px;
        }

        .nokia-label {
            text-align: center;
            color: #8fa4d4;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        canvas {
            display: block;
            width: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border-radius: 4px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin-top: 10px;
        }

        .btn-row {
            display: flex;
            gap: 4px;
            justify-content: center;
        }

        .btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: #1a2a4a;
            color: #8fa4d4;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow:
                0 3px 0 #0d1a33,
                0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.05s, box-shadow 0.05s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow:
                0 1px 0 #0d1a33,
                0 2px 3px rgba(0,0,0,0.3);
        }

        .btn-center {
            width: 40px;
            height: 40px;
            font-size: 14px;
            background: #3d5a99;
        }

        .action-btns {
            display: flex;
            gap: 40px;
            margin-top: 8px;
        }

        .btn-action {
            width: 64px;
            height: 36px;
            border-radius: 18px;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .swipe-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .swipe-area.active {
            pointer-events: auto;
        }

        @media (max-height: 600px) {
            .phone {
                border-radius: 20px;
                padding: 12px;
            }
            .screen-frame {
                padding: 8px;
                margin-bottom: 8px;
            }
            .btn {
                width: 48px;
                height: 48px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="swipe-area" id="swipeArea"></div>

    <div class="phone">
        <div class="nokia-label">NOKIA</div>
        <div class="screen-frame">
            <div class="screen-header">
                <span class="title">Snake II</span>
                <span id="scoreDisplay">Wynik: 0</span>
            </div>
            <canvas id="gameCanvas" width="320" height="320"></canvas>
        </div>
        <div class="controls">
            <div class="btn-row">
                <div style="width:56px"></div>
                <button class="btn" id="btnUp" aria-label="Góra">▲</button>
                <div style="width:56px"></div>
            </div>
            <div class="btn-row">
                <button class="btn" id="btnLeft" aria-label="Lewo">◄</button>
                <button class="btn btn-center" id="btnOk" aria-label="OK">OK</button>
                <button class="btn" id="btnRight" aria-label="Prawo">►</button>
            </div>
            <div class="btn-row">
                <div style="width:56px"></div>
                <button class="btn" id="btnDown" aria-label="Dół">▼</button>
                <div style="width:56px"></div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // ---- CONFIG ----
        const GRID_SIZE = 20;
        const COLS = 16;
        const ROWS = 16;
        const CANVAS_PX = COLS * GRID_SIZE;

        // Nokia 3310 screen colors
        const COLOR_BG = '#7b8c3e';
        const COLOR_PIXEL = '#2d3a1a';
        const COLOR_PIXEL_LIGHT = '#5a6b2e';
        const COLOR_FOOD = '#2d3a1a';

        // Speeds: ms per tick
        const SPEED_INITIAL = 180;
        const SPEED_MIN = 80;
        const SPEED_DECREASE = 3;

        // ---- CANVAS SETUP ----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = CANVAS_PX;
        canvas.height = CANVAS_PX;

        // ---- GAME STATE ----
        let snake, direction, nextDirection, food, score, highScore, gameRunning, gameOver, speed, gameLoop;

        highScore = parseInt(localStorage.getItem('snakeHighScore') || '0', 10);

        function init() {
            const startX = Math.floor(COLS / 2);
            const startY = Math.floor(ROWS / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = SPEED_INITIAL;
            gameOver = false;
            gameRunning = false;
            updateScoreDisplay();
            placeFood();
            drawStartScreen();
            enableSwipe();
        }

        // ---- FOOD ----
        function placeFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y));
            food = pos;
        }

        // ---- DRAWING ----
        function clearScreen() {
            ctx.fillStyle = COLOR_BG;
            ctx.fillRect(0, 0, CANVAS_PX, CANVAS_PX);
        }

        function drawPixelBlock(x, y, color) {
            const px = x * GRID_SIZE;
            const py = y * GRID_SIZE;
            ctx.fillStyle = color || COLOR_PIXEL;
            ctx.fillRect(px + 1, py + 1, GRID_SIZE - 2, GRID_SIZE - 2);
        }

        function drawBorder() {
            ctx.strokeStyle = COLOR_PIXEL;
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, CANVAS_PX - 2, CANVAS_PX - 2);
        }

        function drawSnake() {
            snake.forEach(function(seg, i) {
                if (i === 0) {
                    // Head - solid block
                    drawPixelBlock(seg.x, seg.y, COLOR_PIXEL);
                } else {
                    // Body - slightly different pattern for Nokia look
                    const px = seg.x * GRID_SIZE;
                    const py = seg.y * GRID_SIZE;
                    ctx.fillStyle = COLOR_PIXEL;
                    ctx.fillRect(px + 2, py + 2, GRID_SIZE - 4, GRID_SIZE - 4);
                }
            });
        }

        function drawFood() {
            const px = food.x * GRID_SIZE;
            const py = food.y * GRID_SIZE;
            // Nokia-style food: small centered square with dot pattern
            ctx.fillStyle = COLOR_FOOD;
            ctx.fillRect(px + 3, py + 3, GRID_SIZE - 6, GRID_SIZE - 6);
            ctx.fillStyle = COLOR_BG;
            ctx.fillRect(px + 7, py + 7, 6, 6);
            ctx.fillStyle = COLOR_FOOD;
            ctx.fillRect(px + 9, py + 9, 2, 2);
        }

        function drawGame() {
            clearScreen();
            drawBorder();
            drawFood();
            drawSnake();
        }

        function drawStartScreen() {
            clearScreen();
            drawBorder();

            ctx.fillStyle = COLOR_PIXEL;
            ctx.font = 'bold 28px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('SNAKE', CANVAS_PX / 2, CANVAS_PX / 2 - 40);

            ctx.font = '14px Courier New';
            ctx.fillText('Dotknij ekran', CANVAS_PX / 2, CANVAS_PX / 2 + 10);
            ctx.fillText('lub naciśnij OK', CANVAS_PX / 2, CANVAS_PX / 2 + 30);

            if (highScore > 0) {
                ctx.font = '12px Courier New';
                ctx.fillText('Rekord: ' + highScore, CANVAS_PX / 2, CANVAS_PX / 2 + 65);
            }

            // Draw a small snake icon
            for (let i = 0; i < 5; i++) {
                drawPixelBlock(6 + i, 4, i === 4 ? COLOR_PIXEL : COLOR_PIXEL_LIGHT);
            }
        }

        function drawGameOverScreen() {
            clearScreen();
            drawBorder();

            ctx.fillStyle = COLOR_PIXEL;
            ctx.font = 'bold 22px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('KONIEC GRY', CANVAS_PX / 2, CANVAS_PX / 2 - 40);

            ctx.font = '16px Courier New';
            ctx.fillText('Wynik: ' + score, CANVAS_PX / 2, CANVAS_PX / 2);

            if (score >= highScore && score > 0) {
                ctx.font = 'bold 14px Courier New';
                ctx.fillText('NOWY REKORD!', CANVAS_PX / 2, CANVAS_PX / 2 + 25);
            }

            ctx.font = '12px Courier New';
            ctx.fillText('Naciśnij OK', CANVAS_PX / 2, CANVAS_PX / 2 + 60);
            ctx.fillText('aby zagrać ponownie', CANVAS_PX / 2, CANVAS_PX / 2 + 78);
        }

        // ---- SCORE ----
        function updateScoreDisplay() {
            document.getElementById('scoreDisplay').textContent = 'Wynik: ' + score;
        }

        // ---- GAME LOGIC ----
        function update() {
            direction = { x: nextDirection.x, y: nextDirection.y };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Wall collision
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                endGame();
                return;
            }

            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // Eating food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScoreDisplay();
                placeFood();
                // Speed up
                speed = Math.max(SPEED_MIN, speed - SPEED_DECREASE);
                clearInterval(gameLoop);
                gameLoop = setInterval(update, speed);
            } else {
                snake.pop();
            }

            drawGame();
        }

        function startGame() {
            if (gameRunning) return;
            const startX = Math.floor(COLS / 2);
            const startY = Math.floor(ROWS / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = SPEED_INITIAL;
            gameOver = false;
            gameRunning = true;
            updateScoreDisplay();
            placeFood();
            drawGame();
            gameLoop = setInterval(update, speed);
            enableSwipe();
        }

        function endGame() {
            gameRunning = false;
            gameOver = true;
            clearInterval(gameLoop);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', String(highScore));
            }
            drawGameOverScreen();
        }

        // ---- INPUT: Direction change ----
        function changeDirection(dx, dy) {
            if (!gameRunning && !gameOver) {
                startGame();
                return;
            }
            if (gameOver) {
                init();
                startGame();
                return;
            }
            // Prevent reversing
            if (direction.x === -dx && direction.y === -dy) return;
            // Prevent same direction spam
            if (nextDirection.x === dx && nextDirection.y === dy) return;

            nextDirection = { x: dx, y: dy };
        }

        // ---- INPUT: Buttons ----
        document.getElementById('btnUp').addEventListener('pointerdown', function(e) {
            e.preventDefault();
            changeDirection(0, -1);
        });
        document.getElementById('btnDown').addEventListener('pointerdown', function(e) {
            e.preventDefault();
            changeDirection(0, 1);
        });
        document.getElementById('btnLeft').addEventListener('pointerdown', function(e) {
            e.preventDefault();
            changeDirection(-1, 0);
        });
        document.getElementById('btnRight').addEventListener('pointerdown', function(e) {
            e.preventDefault();
            changeDirection(1, 0);
        });
        document.getElementById('btnOk').addEventListener('pointerdown', function(e) {
            e.preventDefault();
            if (!gameRunning) {
                if (gameOver) init();
                startGame();
            }
        });

        // ---- INPUT: Keyboard ----
        document.addEventListener('keydown', function(e) {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    e.preventDefault(); changeDirection(0, -1); break;
                case 'ArrowDown': case 's': case 'S':
                    e.preventDefault(); changeDirection(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A':
                    e.preventDefault(); changeDirection(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D':
                    e.preventDefault(); changeDirection(1, 0); break;
                case 'Enter': case ' ':
                    e.preventDefault();
                    if (!gameRunning) {
                        if (gameOver) init();
                        startGame();
                    }
                    break;
            }
        });

        // ---- INPUT: Swipe (touch) ----
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;
        const SWIPE_THRESHOLD = 30;

        function enableSwipe() {
            document.getElementById('swipeArea').classList.add('active');
        }

        const swipeArea = document.getElementById('swipeArea');

        swipeArea.addEventListener('touchstart', function(e) {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            touchStartTime = Date.now();
        }, { passive: false });

        swipeArea.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        swipeArea.addEventListener('touchend', function(e) {
            e.preventDefault();
            if (e.changedTouches.length === 0) return;

            const touch = e.changedTouches[0];
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            const elapsed = Date.now() - touchStartTime;

            // Tap detection (short touch, small movement)
            if (Math.abs(dx) < 15 && Math.abs(dy) < 15 && elapsed < 300) {
                if (!gameRunning) {
                    if (gameOver) init();
                    startGame();
                }
                return;
            }

            // Swipe detection
            if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) return;

            if (Math.abs(dx) > Math.abs(dy)) {
                // Horizontal swipe
                changeDirection(dx > 0 ? 1 : -1, 0);
            } else {
                // Vertical swipe
                changeDirection(0, dy > 0 ? 1 : -1);
            }
        }, { passive: false });

        // Prevent default touch behavior on phone div too
        document.querySelector('.phone').addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // ---- INIT ----
        init();

    })();
    </script>
</body>
</html>
